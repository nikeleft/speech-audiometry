<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ομιλητική Ακουομετρία - V67</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; --warning: #ff9500; --bg: #f2f2f7; --card: #ffffff; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 15px; background: var(--bg); color: #1c1c1e; margin: 0; }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .app-logo { text-align: center; margin-bottom: 20px; }
        .icon-circle { width: 70px; height: 70px; background: var(--primary); border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 35px; }
        .cal-box { background: #1c1c1e; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .cal-btn { background: var(--danger); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        label { font-weight: 800; font-size: 0.8em; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #d1d1d6; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; }
        .ear-selector-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .ear-opt { flex: 1; text-align: center; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: 900; background: #e5e5ea; transition: 0.2s; }
        .ear-opt.active.L { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(0,122,255,0.4); }
        .ear-opt.active.R { background: var(--danger); color: white; box-shadow: 0 5px 15px rgba(255,59,48,0.4); }
        .custom-file-upload { display: flex; align-items: center; justify-content: center; height: 48px; border: 2px dashed var(--primary); border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        .file-selected { border: 2px solid var(--success) !important; background: #f2faf4 !important; color: #1a7d32 !important; }
        .play-btn { background: var(--primary); color: white; width: 100%; padding: 22px; border: none; border-radius: 20px; font-size: 30px; font-weight: 900; cursor: pointer; margin-bottom: 15px; }
        .secondary-btn { background: var(--warning); color: white; width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        canvas { width: 100%; height: 280px; background: #fff; border-radius: 15px; }
        .pdf-card { border: 6px solid var(--primary); padding: 25px; border-radius: 25px; background: white; }
        .srt-box { background: var(--success); color: white; padding: 20px; border-radius: 18px; text-align: center; font-size: 3.5em; font-weight: 900; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; margin-top: 15px; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; }
        .strike-err { color: var(--danger); text-decoration: line-through; }
        .scoring-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn-score { border: none; border-radius: 15px; padding: 20px 0; font-weight: 900; font-size: 1.8em; color: #fff; cursor: pointer; }
        .s0 { background: var(--danger); } .s1a { background: var(--warning); } .s1b { background: #ffcc00; color: #000; } .s2 { background: var(--success); }
        .range-box { display: none; }
        .range-box.active { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #historyList { margin-top: 10px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body onload="loadHistory()">

<div class="container">
    <div id="setup">
        <div class="app-logo"><div class="icon-circle">🎧</div><h2 style="color:var(--primary); margin: 10px 0;">Ομιλητική Ακουομετρία</h2></div>
        
        <div class="cal-box">
            <span style="font-weight:bold;">CALIBRATION (1kHz)</span>
            <button id="calBtn" class="cal-btn" onclick="toggleCalibration()">START</button>
        </div>

        <div style="display:grid; grid-template-columns: 3fr 1fr; gap:10px;">
            <div><label>Ονοματεπώνυμο</label><input type="text" id="pName" placeholder="Ονοματεπώνυμο"></div>
            <div><label>Ηλικία</label><input type="number" id="pAge" placeholder="Ηλικία"></div>
        </div>

        <label>ΠΛΕΥΡΑ ΕΞΕΤΑΣΗΣ</label>
        <div class="ear-selector-box">
            <div id="optL" class="ear-opt L active" onclick="switchSide('L')">ΑΡΙΣΤΕΡΟ (L)</div>
            <div id="optR" class="ear-opt R" onclick="switchSide('R')">ΔΕΞΙ (R)</div>
        </div>

        <div style="background:#f9f9fb; padding:15px; border-radius:15px; border:1px solid #ddd; margin-bottom:15px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Αρχικό SNR (dB)</label><input type="number" id="startSNR" value="10"></div>
                <div><label>Τόνος Προσοχής</label><select id="preToneUse"><option value="yes">Ναι</option><option value="no">Όχι</option></select></div>
            </div>

            <div id="rangeL" class="range-box active">
                <div><label>L: Από λέξη #</label><input type="number" id="wordFromL" value="1"></div>
                <div><label>L: Έως λέξη #</label><input type="number" id="wordToL" value="25"></div>
            </div>
            <div id="rangeR" class="range-box">
                <div><label>R: Από λέξη #</label><input type="number" id="wordFromR" value="1"></div>
                <div><label>R: Έως λέξη #</label><input type="number" id="wordToR" value="25"></div>
            </div>

            <label for="lF" class="custom-file-upload" id="ll">📂 ΦΟΡΤΩΣΗ ΛΙΣΤΑΣ (.txt)</label><input type="file" id="lF" style="display:none" onchange="hSelect('list')">
            <label for="nF" class="custom-file-upload" id="ln">🔊 ΦΟΡΤΩΣΗ ΘΟΡΥΒΟΥ</label><input type="file" id="nF" style="display:none" onchange="hSelect('noise')">
            <label for="wF" class="custom-file-upload" id="lw">🎵 ΦΟΡΤΩΣΗ ΗΧΗΤΙΚΩΝ</label><input type="file" id="wF" style="display:none" multiple onchange="hSelect('words')">
        </div>
        <button class="play-btn" style="font-size:20px;" onclick="runTest()">ΕΝΑΡΞΗ ΕΞΕΤΑΣΗΣ</button>

        <div style="background: #fff; border: 1px solid #ddd; border-radius: 15px; padding: 15px; margin-top: 20px;">
            <label>ΙΣΤΟΡΙΚΟ</label>
            <div id="historyList"></div>
            <button onclick="clearHistory()" style="width:100%; border:none; background:none; color:var(--danger); font-size:0.8em; margin-top:10px; cursor:pointer;">ΔΙΑΓΡΑΦΗ ΙΣΤΟΡΙΚΟΥ</button>
        </div>
    </div>

    <div id="testUI" style="display:none;">
        <h2 id="earInd" style="text-align:center; padding:12px; border-radius:12px; margin-top:0; font-weight:900;"></h2>
        <div style="text-align:center;">
            <div style="font-size:4.5em; font-weight:900; color:var(--primary);" id="snrDisp">10 dB</div>
            <div style="font-weight:800; color:#888;" id="revDisp">Αναστροφές: 0/6</div>
        </div>
        <canvas id="cCanvas"></canvas>
        <div style="text-align:center; font-size:3.5em; font-weight:900; padding:20px; border:4px solid var(--primary); border-radius:20px; margin:15px 0; background:#fff;" id="wDisp">---</div>
        <button class="play-btn" onclick="playAudio()">▶</button>
        <div class="scoring-grid">
            <button class="btn-score s0" onclick="handleScore(0)">0</button>
            <button class="btn-score s1a" onclick="handleScore(1,'a')">1α</button>
            <button class="btn-score s1b" onclick="handleScore(1,'b')">1β</button>
            <button class="btn-score s2" onclick="handleScore(2)">2</button>
        </div>
        <div style="text-align:center; margin-top:15px; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="undo()" style="color:#888; border:none; background:none; font-weight:bold; cursor:pointer;">⟲ UNDO</button>
            <button onclick="stopAndReturn()" style="color:var(--danger); border:2px solid var(--danger); background:white; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer;">🛑 ΔΙΑΚΟΠΗ & ΕΠΙΣΤΡΟΦΗ</button>
        </div>
    </div>

    <div id="resUI" style="display:none;">
        <div class="pdf-card" id="printArea">
            <h1 style="color:var(--primary); border-bottom: 5px solid var(--primary); margin:0; padding-bottom:5px;">Αναφορά Εξέτασης</h1>
            <div id="resMeta" style="margin:15px 0; font-size:1.15em; line-height:1.6;"></div>
            <div class="srt-box" id="srtFinal">0 dB</div>
            <div id="chartContainer">
                 <canvas id="fCanvas"></canvas>
            </div>
            <table id="resTable"><thead><tr><th>#</th><th>Λέξη</th><th>SNR</th><th>Σκορ</th></tr></thead><tbody></tbody></table>
        </div>
        <div style="margin-top:15px; display:grid; gap:12px;">
            <button class="play-btn" style="font-size:18px;" onclick="smartPDFDownload()">ΛΗΨΗ PDF (ANDROID)</button>
            <button class="play-btn" style="background:var(--success); font-size:18px;" onclick="exportToExcelV2()">ΕΞΑΓΩΓΗ ΣΕ EXCEL</button>
            <button class="secondary-btn" onclick="saveAndNext()">ΑΠΟΘΗΚΕΥΣΗ & ΑΛΛΟ ΑΥΤΙ</button>
            <button class="secondary-btn" style="background:#8e8e93" onclick="stopAndReturn()">ΕΠΙΣΤΡΟΦΗ ΣΤΗΝ ΑΡΧΙΚΗ</button>
        </div>
    </div>
</div>

<script>
    let audioCtx, curSide = 'L', calNode = null, gData = { list: {}, noise: null, words: {} };
    let state = { hist: [], revs: [], idx: 0, snr: 10, step: 2, lastD: null, activeWords: [] };

    function switchSide(s) { 
        curSide = s; 
        document.querySelectorAll('.ear-opt').forEach(el => el.classList.remove('active')); 
        document.getElementById('opt'+s).classList.add('active'); 
        document.getElementById('rangeL').classList.toggle('active', s === 'L');
        document.getElementById('rangeR').classList.toggle('active', s === 'R');
    }

    async function hSelect(type) {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const input = document.getElementById(type==='list'?'lF':(type==='noise'?'nF':'wF'));
        if(type==='list') {
            const txt = await input.files[0].text();
            txt.split('\n').forEach((line, i) => {
                const parts = line.split(','); if(parts.length >= 3) gData.list[i+1] = {id:parts[0].trim(), s1:parts[1].trim(), s2:parts[2].trim()};
            });
            document.getElementById('ll').classList.add('file-selected');
        } else if(type==='noise') {
            gData.noise = await audioCtx.decodeAudioData(await input.files[0].arrayBuffer());
            document.getElementById('ln').classList.add('file-selected');
        } else {
            for(let f of input.files) { const id = f.name.replace(/\.[^/.]+$/, "").trim(); gData.words[id] = await audioCtx.decodeAudioData(await f.arrayBuffer()); }
            document.getElementById('lw').classList.add('file-selected');
        }
    }

    function runTest() {
        let from = parseInt(document.getElementById(curSide === 'L' ? 'wordFromL' : 'wordFromR').value) || 1;
        let to = parseInt(document.getElementById(curSide === 'L' ? 'wordToL' : 'wordToR').value) || 100;
        let available = [];
        for(let i = from; i <= to; i++) {
            if(gData.list[i] && gData.words[gData.list[i].id]) available.push({...gData.list[i], buffer: gData.words[gData.list[i].id]});
        }
        if(!available.length) return alert("Σφάλμα: Δεν βρέθηκαν λέξεις στο εύρος που ορίσατε.");
        
        available = available.sort(() => Math.random() - 0.5);
        state = { hist: [], revs: [], idx: 0, snr: parseFloat(document.getElementById('startSNR').value), step: 2, lastD: null, activeWords: available };
        
        document.getElementById('setup').style.display='none'; 
        document.getElementById('testUI').style.display='block';
        const ind = document.getElementById('earInd');
        ind.innerText = curSide==='L'?"ΑΡΙΣΤΕΡΟ ΑΥΤΙ":"ΔΕΞΙ ΑΥΤΙ";
        ind.style.color = curSide==='L'?'#007aff':'#ff3b30';
        updateUI();
    }

    function stopAndReturn() {
        if(confirm("Επιστροφή στην αρχική οθόνη; Τα στοιχεία θα διατηρηθούν.")) {
            document.getElementById('testUI').style.display='none';
            document.getElementById('resUI').style.display='none';
            document.getElementById('setup').style.display='block';
        }
    }

    async function playAudio() {
        if(audioCtx.state === 'suspended') await audioCtx.resume();
        if(document.getElementById('preToneUse').value === 'yes') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain(), p = audioCtx.createStereoPanner();
            p.pan.value = (curSide === 'R' ? 1 : -1); g.gain.setValueAtTime(0.15, audioCtx.currentTime);
            o.connect(g).connect(p).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.15);
            await new Promise(r => setTimeout(r, 400));
        }
        const b = state.activeWords[state.idx].buffer, out = audioCtx.createBuffer(2, b.length, b.sampleRate);
        for(let c=0; c<2; c++){
            const sD=b.getChannelData(0), oD=out.getChannelData(c);
            if(gData.noise && ((curSide==='L'&&c===0)||(curSide==='R'&&c===1))){
                const nD=gData.noise.getChannelData(c%gData.noise.numberOfChannels);
                let pS=0, pN=0; for(let i=0; i<b.length; i++){ pS+=sD[i]**2; pN+=nD[i%gData.noise.length]**2; }
                const k = Math.sqrt(pS/b.length)/(Math.sqrt(pN/b.length)*Math.pow(10,state.snr/20));
                for(let i=0; i<b.length; i++) oD[i]=sD[i]+(k*nD[i%gData.noise.length]);
            } else if((curSide==='L'&&c===0)||(curSide==='R'&&c===1)) for(let i=0; i<b.length; i++) oD[i]=sD[i];
        }
        const s = audioCtx.createBufferSource(); s.buffer=out; s.connect(audioCtx.destination); s.start();
    }

    function handleScore(val, type='') {
        const w = state.activeWords[state.idx];
        const isRev = (state.lastD && state.lastD !== (val===2?'down':'up'));
        state.hist.push({ snr:state.snr, val, type, s1:w.s1, s2:w.s2, lastD:state.lastD, revs:[...state.revs], step:state.step });
        if(isRev){ state.revs.push(state.snr); if(state.revs.length>=2) state.step=1; }
        state.lastD=val===2?'down':'up'; state.snr += (val===2?-state.step:state.step);
        if(state.revs.length>=6 || state.idx >= state.activeWords.length - 1) {
            const avg = state.revs.length > 0 ? (state.revs.reduce((a,b)=>a+b,0)/state.revs.length).toFixed(1) : state.snr;
            saveRecord(avg); return finish(avg);
        }
        state.idx++; updateUI();
    }

    function updateUI() {
        document.getElementById('snrDisp').innerText = state.snr + " dB";
        document.getElementById('revDisp').innerText = "Αναστροφές: " + state.revs.length + "/6";
        document.getElementById('wDisp').innerText = state.activeWords[state.idx].s1 + state.activeWords[state.idx].s2;
        drawGraph('cCanvas', state.hist, state.snr);
    }

    function drawGraph(id, history, currentSNR) {
        const c=document.getElementById(id), ctx=c.getContext('2d');
        if(!c) return; c.width=c.offsetWidth*2; c.height=c.offsetHeight*2; ctx.scale(2,2);
        const w=c.width/2, h=c.height/2; ctx.clearRect(0,0,w,h);
        ctx.strokeStyle="#e5e5ea"; ctx.lineWidth=1;
        for(let i=-10; i<=30; i+=10) {
            let y = h-40-((i+10)*(h-60)/40);
            ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(w-10,y); ctx.stroke();
            ctx.fillStyle="#8e8e93"; ctx.font="bold 11px sans-serif"; ctx.fillText(i,5,y+4);
        }
        const data = history.map(h => h.snr).concat(currentSNR !== null ? currentSNR : []);
        if(data.length>0){
            const color = curSide==='L'?'#007aff':'#ff3b30';
            ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=5; ctx.lineJoin="round";
            data.forEach((v,i)=>{
                let x=40+(i*(w-60)/(data.length-1||1)), y=h-40-((v+10)*(h-60)/40);
                if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
            });
            ctx.stroke();
            data.forEach((v,i)=>{
                let x=40+(i*(w-60)/(data.length-1||1)), y=h-40-((v+10)*(h-60)/40);
                ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2); ctx.fill();
                ctx.strokeStyle=color; ctx.lineWidth=3; ctx.stroke();
            });
        }
    }

    function finish(avg) {
        document.getElementById('testUI').style.display='none'; document.getElementById('resUI').style.display='block';
        document.getElementById('resMeta').innerHTML = `Ασθενής: <b>${document.getElementById('pName').value}</b> | Ηλικία: <b>${document.getElementById('pAge').value}</b> | Αυτί: <b>${curSide==='L'?'Αριστερό':'Δεξί'}</b><br>Ημερομηνία: <b>${new Date().toLocaleDateString('el-GR')}</b>`;
        document.getElementById('srtFinal').innerText = avg + " dB";
        setTimeout(() => drawGraph('fCanvas', state.hist, null), 300);
        const tb=document.querySelector('#resTable tbody'); tb.innerHTML="";
        state.hist.forEach((h,i)=>{
            const s1c = (h.val===0||h.type==='b')?'strike-err':''; const s2c = (h.val===0||h.type==='a')?'strike-err':'';
            tb.insertRow().innerHTML=`<td>${i+1}</td><td><span class="${s1c}">${h.s1}</span><span class="${s2c}">${h.s2}</span></td><td>${h.snr}</td><td>${h.val===2?'100%':(h.val===0?'0%':'50%')}</td>`;
        });
    }

    async function smartPDFDownload() {
        const element = document.getElementById('printArea');
        const canvas = document.getElementById('fCanvas');
        const name = document.getElementById('pName').value || "Result";
        
        // Convert canvas to image for PDF compatibility
        const imgData = canvas.toDataURL("image/png");
        const img = document.createElement('img');
        img.src = imgData; img.style.width = '100%';
        
        const container = document.getElementById('chartContainer');
        canvas.style.display = 'none';
        container.appendChild(img);

        const opt = {
            margin: 10,
            filename: `Audit_Result_${name}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
            await html2pdf().set(opt).from(element).save();
        } finally {
            img.remove();
            canvas.style.display = 'block';
        }
    }

    function toggleCalibration() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const b = document.getElementById('calBtn');
        if(calNode) { calNode.stop(); calNode = null; b.innerText="START"; }
        else {
            calNode = audioCtx.createOscillator(); const g = audioCtx.createGain(); const p = audioCtx.createStereoPanner();
            p.pan.value = (curSide==='R'?1:-1); g.gain.value = 0.25; calNode.connect(g).connect(p).connect(audioCtx.destination);
            calNode.start(); b.innerText="STOP";
        }
    }

    function saveAndNext() {
        switchSide(curSide === 'L' ? 'R' : 'L');
        document.getElementById('resUI').style.display='none'; document.getElementById('setup').style.display='block';
    }

    function undo() { if(state.hist.length){ const l=state.hist.pop(); state.snr=l.snr; state.lastD=l.lastD; state.revs=l.revs; state.step=l.step; state.idx--; updateUI(); } }

    function saveRecord(srt) {
        const h = JSON.parse(localStorage.getItem('audit_v63_history') || '[]');
        h.push({ name: document.getElementById('pName').value || 'Ανώνυμος', age: document.getElementById('pAge').value, date: new Date().toLocaleString('el-GR'), side: curSide, ear: curSide === 'L' ? 'Αριστερό' : 'Δεξί', srt: srt, hist: [...state.hist] });
        localStorage.setItem('audit_v63_history', JSON.stringify(h)); loadHistory();
    }

    function loadHistory() {
        const h = JSON.parse(localStorage.getItem('audit_v63_history') || '[]');
        const container = document.getElementById('historyList');
        container.innerHTML = h.length === 0 ? '<p style="color:#999; text-align:center;">Κανένα αποτέλεσμα</p>' : '';
        h.slice(-5).reverse().forEach(item => {
            container.innerHTML += `<div class="history-item"><div><b>${item.name}</b><br><small>${item.date} | ${item.ear} | SRT: ${item.srt}dB</small></div></div>`;
        });
    }

    function clearHistory() { if(confirm("Διαγραφή ιστορικού;")) { localStorage.removeItem('audit_v63_history'); loadHistory(); } }

    function exportToExcelV2() {
        const name = document.getElementById('pName').value || "Patient";
        let xml = `<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
        <Worksheet ss:Name="Results"><Table>
        <Row><Cell><Data ss:Type="String">A/A</Data></Cell><Cell><Data ss:Type="String">Word</Data></Cell><Cell><Data ss:Type="String">SNR</Data></Cell><Cell><Data ss:Type="String">Score</Data></Cell></Row>`;
        state.hist.forEach((h, i) => {
            xml += `<Row><Cell><Data ss:Type="Number">${i+1}</Data></Cell><Cell><Data ss:Type="String">${h.s1}${h.s2}</Data></Cell><Cell><Data ss:Type="Number">${h.snr}</Data></Cell><Cell><Data ss:Type="String">${h.val===2?'100%':(h.val===0?'0%':'50%')}</Data></Cell></Row>`;
        });
        xml += `</Table></Worksheet></Workbook>`;
        const blob = new Blob([xml], { type: "application/vnd.ms-excel" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Results_${name}.xls`; a.click();
    }
</script>
</body>
</html>
