<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Ομιλητική Ακουομετρία - V55</title>
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; --warning: #ff9500; --bg: #f2f2f7; --card: #ffffff; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; background: var(--bg); color: #1c1c1e; margin: 0; }
        .container { max-width: 850px; margin: 20px auto; background: var(--card); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        .app-logo { text-align: center; margin-bottom: 20px; }
        .icon-circle { width: 80px; height: 80px; background: var(--primary); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 40px; box-shadow: 0 10px 20px rgba(0,122,255,0.3); }

        .cal-box { background: #1c1c1e !important; color: white; padding: 15px; border-radius: 15px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; border: 2px solid var(--primary); }
        .cal-btn { background: var(--danger); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        label { font-weight: 800; font-size: 0.85em; color: #555; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #d1d1d6; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }

        .ear-selector-box { display: flex; background: #e5e5ea; padding: 5px; border-radius: 15px; margin-bottom: 20px; }
        .ear-opt { flex: 1; text-align: center; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 900; transition: 0.3s; }
        .ear-opt.active.R { background: var(--danger) !important; color: white !important; box-shadow: inset 0 0 0 1000px var(--danger); }
        .ear-opt.active.L { background: var(--primary) !important; color: white !important; box-shadow: inset 0 0 0 1000px var(--primary); }

        .custom-file-upload { display: flex; align-items: center; justify-content: center; height: 50px; border: 2px dashed var(--primary); border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; color: var(--primary); background: #fff; }
        .file-selected { border: 3px solid var(--success) !important; background: #f2faf4 !important; color: #1a7d32 !important; }
        
        .play-btn { background: var(--primary) !important; color: white !important; width: 100%; padding: 22px; border: none; border-radius: 20px; font-size: 20px; font-weight: 900; cursor: pointer; margin-bottom: 10px; box-shadow: inset 0 0 0 1000px var(--primary); transition: 0.2s; }
        .play-btn:active { transform: scale(0.98); }

        .graph-wrapper { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 20px; margin: 15px 0; position: relative; }
        canvas { width: 100%; height: 280px; }

        .history-panel { margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 20px; border: 1px solid #ddd; }
        .history-list { max-height: 250px; overflow-y: auto; background: white; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; }
        .history-item { padding: 12px; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; text-align: center; font-size: 0.9em; cursor: pointer; }
        .history-item:hover { background: #f0f7ff; }
        .history-header-row { font-weight: bold; background: var(--primary); color: white; padding: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; text-align: center; border-radius: 10px 10px 0 0; }

        .pdf-card { border: 8px solid var(--primary) !important; padding: 30px; border-radius: 30px; background: white !important; }
        .srt-box { 
            background-color: var(--success) !important; color: white !important; padding: 25px; border-radius: 20px; text-align: center; 
            font-size: 3.5em; font-weight: 900; margin: 20px 0; box-shadow: inset 0 0 0 1000px var(--success) !important;
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: var(--primary) !important; color: white !important; padding: 12px; box-shadow: inset 0 0 0 1000px var(--primary) !important; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; }
        .strike-err { color: var(--danger) !important; text-decoration: line-through !important; }

        .scoring-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-score { border: none; border-radius: 15px; padding: 20px 5px; font-weight: 900; font-size: 1.8em; color: #fff; cursor: pointer; }
        .s0 { background: var(--danger); } .s1a { background: var(--warning); } .s1b { background: #ffcc00; color: #000; } .s2 { background: var(--success); }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white !important; padding: 0; }
            .container { box-shadow: none; margin: 0; width: 100%; padding: 0; } 
            .pdf-card { border: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup">
        <div class="app-logo">
            <div class="icon-circle">🎧</div>
            <h2 style="color:var(--primary); margin-top:10px;">Ομιλητική Ακουομετρία</h2>
        </div>
        
        <div class="cal-box no-print">
            <label style="color:white; margin:0;">Calibration (1kHz)</label>
            <button id="calBtn" class="cal-btn" onclick="toggleCalibration()">Start Tone</button>
        </div>

        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:15px;">
            <div><label>Ονοματεπώνυμο</label><input type="text" id="pName" placeholder="Ονοματεπώνυμο"></div>
            <div><label>Ηλικία</label><input type="number" id="pAge" placeholder="π.χ. 45"></div>
        </div>

        <label>ΠΛΕΥΡΑ ΕΞΕΤΑΣΗΣ</label>
        <div class="ear-selector-box">
            <div id="optL" class="ear-opt L active" onclick="switchSide('L')">ΑΡΙΣΤΕΡΟ (L)</div>
            <div id="optR" class="ear-opt R" onclick="switchSide('R')">ΔΕΞΙ (R)</div>
        </div>

        <div style="background:#f9f9fb; padding:20px; border-radius:20px; border:1px solid #ddd; margin-bottom:20px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Αρχικό SNR (dB)</label><input type="number" id="startSNR" value="10"></div>
                <div><label>Τόνος Προσοχής</label><select id="preToneUse"><option value="yes">Ναι</option><option value="no">Όχι</option></select></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <div><label>Από Λέξη (#)</label><input type="number" id="wordStart" value="1"></div>
                <div><label>Έως Λέξη (#)</label><input type="number" id="wordEnd" value="25"></div>
            </div>
            <label for="lF" class="custom-file-upload" id="ll">📂 ΦΟΡΤΩΣΗ ΛΙΣΤΑΣ (.txt)</label><input type="file" id="lF" style="display:none" onchange="hSelect('list')">
            <label for="nF" class="custom-file-upload" id="ln">🔊 ΦΟΡΤΩΣΗ ΘΟΡΥΒΟΥ</label><input type="file" id="nF" style="display:none" onchange="hSelect('noise')">
            <label for="wF" class="custom-file-upload" id="lw">🎵 ΦΟΡΤΩΣΗ ΗΧΗΤΙΚΩΝ</label><input type="file" id="wF" style="display:none" multiple onchange="hSelect('words')">
        </div>

        <button class="play-btn" onclick="runTest()">ΕΝΑΡΞΗ ΕΞΕΤΑΣΗΣ</button>

        <div class="history-panel no-print">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; color:#444;">Ιστορικό Εξετάσεων</h3>
                <button onclick="searchHistory()" style="padding:8px 15px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">🔍 Αναζήτηση</button>
            </div>
            <div class="history-list" id="hList">
                <div class="history-header-row"><span>Ημερομηνία</span><span>Ασθενής</span><span>Αυτί</span><span>SRT</span></div>
                <div id="hItems"></div>
            </div>
        </div>
    </div>

    <div id="testUI" style="display:none;">
        <h3 id="earInd" style="text-align:center;"></h3>
        <div style="text-align:center;">
            <div style="font-size:4em; font-weight:900; color:var(--primary); margin-bottom:0;" id="snrDisp">10 dB</div>
            <div style="font-size:1.2em; font-weight:bold; color:#8e8e93; margin-top:-10px; margin-bottom:15px;" id="revDisp">Αναστροφές: 0/6</div>
        </div>
        <div class="graph-wrapper"><canvas id="cCanvas"></canvas></div>
        <div style="text-align:center; font-size:3em; font-weight:900; background:#fff; padding:20px; border-radius:20px; border:4px solid var(--primary); margin:20px 0;" id="wDisp">---</div>
        <button class="play-btn" onclick="playAudio()">▶ ΑΝΑΠΑΡΑΓΩΓΗ ΛΕΞΗΣ</button>
        <div class="scoring-grid">
            <button class="btn-score s0" onclick="handleScore(0)">0</button>
            <button class="btn-score s1a" onclick="handleScore(1,'a')">1α</button>
            <button class="btn-score s1b" onclick="handleScore(1,'b')">1β</button>
            <button class="btn-score s2" onclick="handleScore(2)">2</button>
        </div>
        <div style="text-align:center; margin-top:20px;"><button onclick="undo()" style="background:none; border:none; color:#888; font-weight:bold; cursor:pointer;">⟲ ΑΝΑΙΡΕΣΗ (UNDO)</button></div>
    </div>

    <div id="resUI" style="display:none;">
        <div class="pdf-card" id="printArea">
            <h1 style="color:var(--primary); border-bottom: 6px solid var(--primary); padding-bottom:10px; margin:0 0 20px 0;">Αναφορά Εξέτασης</h1>
            <div id="resMeta" style="font-size: 1.2em; line-height: 1.6; margin-bottom:20px;"></div>
            <div class="srt-box" id="srtFinal">0 dB</div>
            <div class="graph-wrapper"><canvas id="fCanvas"></canvas></div>
            <table id="resTable"><thead><tr><th>#</th><th>Λέξη</th><th>SNR</th><th>Σκορ</th></tr></thead><tbody></tbody></table>
        </div>
        <div class="no-print" style="margin-top:20px; display:grid; gap:12px;">
            <button class="play-btn" onclick="smartPrint()">ΕΚΤΥΠΩΣΗ ΣΕ PDF</button>
            <button class="play-btn" style="background:var(--success) !important;" onclick="exportToExcel()">ΕΞΑΓΩΓΗ ΣΕ EXCEL</button>
            <button class="play-btn" style="background:var(--warning) !important;" onclick="saveAndNext()">ΑΠΟΘΗΚΕΥΣΗ & ΑΛΛΟ ΑΥΤΙ</button>
            <button class="play-btn" style="background:#8e8e93 !important;" onclick="location.reload()">ΝΕΑ ΕΞΕΤΑΣΗ / ΑΡΧΙΚΗ</button>
        </div>
    </div>
</div>

<script>
    let audioCtx, curSide = 'L', calNode = null, gData = { list: {}, noise: null, words: {} };
    let state = { hist: [], revs: [], idx: 0, snr: 10, step: 2, lastD: null, activeWords: [] };
    let historyDB = JSON.parse(localStorage.getItem('aud_pro_db_v49') || '[]');

    function getFormattedDate() {
        const d = new Date();
        return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    function toggleCalibration() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const b = document.getElementById('calBtn');
        if(calNode) { calNode.stop(); calNode = null; b.innerText="Start Tone"; }
        else {
            calNode = audioCtx.createOscillator(); const g = audioCtx.createGain(); const p = audioCtx.createStereoPanner();
            p.pan.value = (curSide==='R'?1:-1); g.gain.value = 0.3; calNode.connect(g).connect(p).connect(audioCtx.destination);
            calNode.start(); b.innerText="Stop Tone";
        }
    }

    function switchSide(s) {
        curSide = s; document.querySelectorAll('.ear-opt').forEach(el => el.classList.remove('active'));
        document.getElementById('opt'+s).classList.add('active');
    }

    async function hSelect(type) {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const input = document.getElementById(type==='list'?'lF':(type==='noise'?'nF':'wF'));
        if(type==='list') {
            (await input.files[0].text()).split('\n').forEach((line, i) => {
                const parts = line.split(','); if(parts.length >= 3) gData.list[i+1] = {id:parts[0].trim(), s1:parts[1].trim(), s2:parts[2].trim()};
            });
            document.getElementById('ll').classList.add('file-selected');
        } else if(type==='noise') {
            gData.noise = await audioCtx.decodeAudioData(await input.files[0].arrayBuffer());
            document.getElementById('ln').classList.add('file-selected');
        } else {
            for(let f of input.files) { const id = f.name.replace(/\.[^/.]+$/, "").trim(); gData.words[id] = await audioCtx.decodeAudioData(await f.arrayBuffer()); }
            document.getElementById('lw').classList.add('file-selected');
        }
    }

    function runTest() {
        let available = [];
        const startNum = parseInt(document.getElementById('wordStart').value) || 1;
        const endNum = parseInt(document.getElementById('wordEnd').value) || 25;
        for(let i = startNum; i <= endNum; i++) {
            if(gData.list[i] && gData.words[gData.list[i].id]) {
                available.push({...gData.list[i], buffer: gData.words[gData.list[i].id]});
            }
        }
        if(!available.length) return alert("Δεν βρέθηκαν λέξεις στο εύρος!");
        
        state = { hist: [], revs: [], idx: 0, snr: parseFloat(document.getElementById('startSNR').value), step: 2, lastD: null, activeWords: available };
        document.getElementById('setup').style.display='none'; 
        document.getElementById('testUI').style.display='block';
        document.getElementById('earInd').innerText = curSide==='L'?"ΑΥΤΙ: ΑΡΙΣΤΕΡΟ (L)":"ΑΥΤΙ: ΔΕΞΙ (R)";
        updateUI();
    }

    async function playAudio() {
        if(audioCtx.state === 'suspended') await audioCtx.resume();
        if(document.getElementById('preToneUse').value === 'yes') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain(), p = audioCtx.createStereoPanner();
            p.pan.value = (curSide === 'R' ? 1 : -1);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            o.connect(g).connect(p).connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.2);
            await new Promise(r => setTimeout(r, 450));
        }
        const b = state.activeWords[state.idx].buffer, out = audioCtx.createBuffer(2, b.length, b.sampleRate);
        for(let c=0; c<2; c++){
            const sD=b.getChannelData(0), oD=out.getChannelData(c);
            if(gData.noise && ((curSide==='L'&&c===0)||(curSide==='R'&&c===1))){
                const nD=gData.noise.getChannelData(c%gData.noise.numberOfChannels);
                let pS=0, pN=0; for(let i=0; i<b.length; i++){ pS+=sD[i]**2; pN+=nD[i%gData.noise.length]**2; }
                const k = Math.sqrt(pS/b.length)/(Math.sqrt(pN/b.length)*Math.pow(10,state.snr/20));
                for(let i=0; i<b.length; i++) oD[i]=sD[i]+(k*nD[i%gData.noise.length]);
            } else if((curSide==='L'&&c===0)||(curSide==='R'&&c===1)) for(let i=0; i<b.length; i++) oD[i]=sD[i];
        }
        const s = audioCtx.createBufferSource(); s.buffer=out; s.connect(audioCtx.destination); s.start();
    }

    function handleScore(val, type='') {
        const w = state.activeWords[state.idx];
        const isRev = (state.lastD && state.lastD !== (val===2?'down':'up'));
        state.hist.push({ snr:state.snr, val, type, s1:w.s1, s2:w.s2, lastD:state.lastD, revs:[...state.revs], step:state.step, isRev: isRev });
        if(isRev){ state.revs.push(state.snr); if(state.revs.length>=2) state.step=1; }
        state.lastD=val===2?'down':'up'; state.snr += (val===2?-state.step:state.step);
        if(state.revs.length>=6 || state.idx >= state.activeWords.length - 1) return finish();
        state.idx++; updateUI();
    }

    function updateUI() {
        document.getElementById('snrDisp').innerText = state.snr + " dB";
        document.getElementById('revDisp').innerText = "Αναστροφές: " + state.revs.length + "/6";
        document.getElementById('wDisp').innerText = state.activeWords[state.idx].s1 + state.activeWords[state.idx].s2;
        drawGraph('cCanvas', state.hist, state.snr);
    }

    function drawGraph(id, history, currentSNR) {
        const c=document.getElementById(id), ctx=c.getContext('2d');
        if(!c) return;
        c.width=c.offsetWidth * 2; c.height=c.offsetHeight * 2;
        ctx.scale(2,2);
        const w = c.width/2, h = c.height/2;
        ctx.clearRect(0,0,w,h);
        ctx.strokeStyle="#eee"; ctx.lineWidth=1;
        for(let i=-10; i<=30; i+=10) {
            let y = h - 40 - ((i+10)*(h-60)/40);
            ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(w-20, y); ctx.stroke();
            ctx.fillStyle="#999"; ctx.font="10px Arial"; ctx.fillText(i+"dB", 5, y+5);
        }
        const data = history.map(h => h.snr).concat(currentSNR);
        if(data.length > 0) {
            const color = curSide==='L'?'#007aff':'#ff3b30';
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 4;
            data.forEach((v,i) => {
                let x = 40 + (i * (w-80)/(data.length-1 || 1));
                let y = h - 40 - ((v+10)*(h-60)/40);
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            });
            ctx.stroke();
            data.forEach((v,i) => {
                let x = 40 + (i * (w-80)/(data.length-1 || 1));
                let y = h - 40 - ((v+10)*(h-60)/40);
                const histEntry = history[i];
                if(histEntry && histEntry.isRev) {
                    ctx.strokeStyle = color; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(x-6, y-6); ctx.lineTo(x+6, y+6); ctx.moveTo(x+6, y-6); ctx.lineTo(x-6, y+6); ctx.stroke();
                } else {
                    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x,y,6,0,7); ctx.fill();
                }
            });
        }
    }

    function finish() {
        const avg = state.revs.length > 0 ? (state.revs.reduce((a,b)=>a+b,0)/state.revs.length).toFixed(1) : state.snr;
        const patientData = {
            name: document.getElementById('pName').value || 'Ανώνυμος',
            age: document.getElementById('pAge').value || '---',
            ear: curSide === 'L' ? 'Αριστερό' : 'Δεξί',
            srt: avg,
            date: getFormattedDate(),
            history: [...state.hist],
            finalSNR: state.snr
        };
        historyDB.push(patientData);
        localStorage.setItem('aud_pro_db_v49', JSON.stringify(historyDB));
        showResults(patientData);
        renderHistory();
    }

    function showResults(data) {
        document.getElementById('setup').style.display='none';
        document.getElementById('testUI').style.display='none';
        document.getElementById('resUI').style.display='block';
        document.getElementById('resMeta').innerHTML = `Ασθενής: <b>${data.name}</b> | Ηλικία: <b>${data.age}</b> | Αυτί: <b>${data.ear}</b><br>Ημερομηνία: <b>${data.date}</b>`;
        document.getElementById('srtFinal').innerText = data.srt + " dB";
        setTimeout(() => drawGraph('fCanvas', data.history, data.finalSNR), 200);
        const tb=document.querySelector('#resTable tbody'); tb.innerHTML="";
        data.history.forEach((h,i)=>{
            const s1c = (h.val===0||h.type==='b')?'strike-err':'';
            const s2c = (h.val===0||h.type==='a')?'strike-err':'';
            tb.insertRow().innerHTML=`<td>${i+1}</td><td><span class="${s1c}">${h.s1}</span><span class="${s2c}">${h.s2}</span>${h.isRev?' (R)':''}</td><td>${h.snr}</td><td>${h.val===2?'100%':(h.val===0?'0%':'50%')}</td>`;
        });
    }

    // EXCEL EXPORT WITH NATIVE GREEK SUPPORT (UTF-16LE)
    function exportToExcel() {
        let csv = "A/A\tΛέξη\tΣυλλαβή 1\tΚατάσταση 1\tΣυλλαβή 2\tΚατάσταση 2\tSNR\tΣκορ\tΑναστροφή\r\n";
        state.hist.forEach((h,i) => {
            const err1 = (h.val===0||h.type==='b') ? "ΛΑΘΟΣ" : "OK";
            const err2 = (h.val===0||h.type==='a') ? "ΛΑΘΟΣ" : "OK";
            csv += `${i+1}\t${h.s1}${h.s2}\t${h.s1}\t${err1}\t${h.s2}\t${err2}\t${h.snr}\t${h.val===2?'100%':(h.val===0?'0%':'50%')}\t${h.isRev?'ΝΑΙ':''}\r\n`;
        });
        
        // Convert to UTF-16LE for native Excel support
        const buffer = new ArrayBuffer(csv.length * 2 + 2);
        const view = new DataView(buffer);
        view.setUint16(0, 0xFEFF, true); // Little-endian BOM
        for (let i = 0; i < csv.length; i++) {
            view.setUint16((i + 1) * 2, csv.charCodeAt(i), true);
        }
        
        const blob = new Blob([buffer], { type: 'application/vnd.ms-excel' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Result_${document.getElementById('pName').value}_${curSide}.xls`;
        link.click();
    }

    // PDF PRINTING DIALOG
    function smartPrint() {
        const content = document.getElementById('printArea').innerHTML;
        const canvas = document.getElementById('fCanvas');
        const imgData = canvas.toDataURL("image/png");
        const printWin = window.open('', '_blank');
        
        printWin.document.write(`
            <html><head><title>Εκτύπωση Αναφοράς</title>
            <style>
                body { font-family: sans-serif; padding: 20px; }
                .pdf-card { border: 2px solid #007aff; padding: 20px; border-radius: 20px; }
                .srt-box { background: #34c759; color: white; padding: 20px; text-align: center; font-size: 3em; border-radius: 15px; margin: 20px 0; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
                th { background: #007aff; color: white; }
                .strike-err { text-decoration: line-through; color: red; }
                img { width: 100%; height: auto; border: 1px solid #eee; margin-top: 20px; }
            </style></head><body>
            <div class="pdf-card">${content}</div>
            <script>
                const canvasWrapper = document.querySelector('.graph-wrapper');
                canvasWrapper.innerHTML = '<img src="${imgData}">';
                window.onload = function() {
                    window.focus();
                    setTimeout(function() { window.print(); }, 1000);
                };
            <\/script></body></html>
        `);
        printWin.document.close();
    }

    function saveAndNext() {
        const nextSide = curSide === 'L' ? 'R' : 'L';
        switchSide(nextSide);
        document.getElementById('resUI').style.display='none';
        document.getElementById('setup').style.display='block';
    }

    function renderHistory() {
        const container = document.getElementById('hItems');
        container.innerHTML = "";
        historyDB.slice().reverse().forEach((item) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${item.date}</span><span>${item.name}</span><span>${item.ear}</span><span>${item.srt} dB</span>`;
            div.onclick = () => showResults(item);
            container.appendChild(div);
        });
    }

    function searchHistory() {
        const term = prompt("Αναζήτηση ονόματος:");
        if(term === null) return;
        const filtered = historyDB.filter(i => i.name.toLowerCase().includes(term.toLowerCase()));
        const container = document.getElementById('hItems');
        container.innerHTML = "";
        filtered.slice().reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${item.date}</span><span>${item.name}</span><span>${item.ear}</span><span>${item.srt} dB</span>`;
            div.onclick = () => showResults(item);
            container.appendChild(div);
        });
    }

    function undo() {
        if(!state.hist.length) return;
        const l=state.hist.pop();
        state.snr=l.snr; state.lastD=l.lastD; state.revs=l.revs; state.step=l.step;
        state.idx--; updateUI();
    }

    renderHistory();
</script>
</body>
</html>
