<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ομιλητική Ακουομετρία - V88 (Final)</title>
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; --warning: #ff9500; --bg: #f2f2f7; --card: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 15px; background: var(--bg); color: #1c1c1e; margin: 0; }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .cal-box { background: #1c1c1e; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .cal-btn { background: var(--danger); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .ear-tag { background: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.9em; font-weight: 900; }
        label { font-weight: 800; font-size: 0.85em; color: #555; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #d1d1d6; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; }
        .ear-selector-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .ear-opt { flex: 1; text-align: center; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: 900; background: #e5e5ea; font-size: 1.1em; }
        .ear-opt.active.L { background: var(--primary); color: white; }
        .ear-opt.active.R { background: var(--danger); color: white; }
        .range-box { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .range-box.active { display: grid; }
        .custom-file-upload { display: flex; align-items: center; justify-content: center; height: 48px; border: 2px dashed var(--primary); border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        .file-selected { border: 2px solid var(--success) !important; background: #f2faf4 !important; color: #1a7d32 !important; }
        .play-btn { background: var(--primary); color: white; width: 100%; padding: 22px; border: none; border-radius: 20px; font-size: 28px; font-weight: 900; cursor: pointer; margin-bottom: 15px; box-shadow: 0 8px 15px rgba(0,122,255,0.3); }
        .secondary-btn { background: var(--warning); color: white; width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        canvas { width: 100%; height: 280px; background: #fff; border-radius: 15px; border: 1px solid #ddd; margin-top: 10px; }
        .srt-box { background: var(--success); color: white; padding: 20px; border-radius: 18px; text-align: center; font-size: 3.5em; font-weight: 900; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: center; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #ddd; background: #fff; margin-bottom: 10px; border-radius: 15px; transition: 0.2s; }
        .history-item:hover { border-color: var(--primary); background: #f0f7ff; }
        .history-link { cursor: pointer; flex-grow: 1; }
        .del-btn { background: var(--danger); color: white; border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; margin-left: 10px; }
        .scoring-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn-score { border: none; border-radius: 15px; padding: 22px 0; font-weight: 900; font-size: 24px; color: #fff; cursor: pointer; }
        .s0 { background: var(--danger); } .s1a { background: var(--warning); } .s1b { background: #ffcc00; color: #000; } .s2 { background: var(--success); }
    </style>
</head>
<body onload="loadHistory()">

<div class="container">
    <div id="setup">
        <h2 style="text-align:center;">🎧 Ομιλητική Ακουομετρία</h2>
        <div class="cal-box">
            <div>CALIBRATION (1kHz) <span id="calEar" class="ear-tag">LEFT</span></div>
            <button id="calBtn" class="cal-btn" onclick="toggleCalibration()">START</button>
        </div>
        <div style="display:grid; grid-template-columns: 3fr 1fr; gap:10px;">
            <div><label>Ονοματεπώνυμο</label><input type="text" id="pName" placeholder="Όνομα Ασθενούς"></div>
            <div><label>Ηλικία</label><input type="number" id="pAge"></div>
        </div>
        <label>ΠΛΕΥΡΑ ΕΞΕΤΑΣΗΣ</label>
        <div class="ear-selector-box">
            <div id="optL" class="ear-opt L active" onclick="switchSide('L')">ΑΡΙΣΤΕΡΟ</div>
            <div id="optR" class="ear-opt R" onclick="switchSide('R')">ΔΕΞΙ</div>
        </div>
        <div style="background:#f9f9fb; padding:15px; border-radius:15px; border:1px solid #ddd; margin-bottom:15px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Αρχικό SNR (dB)</label><input type="number" id="startSNR" value="10"></div>
                <div><label>Σήμα Προσοχής</label>
                    <select id="preToneUse">
                        <option value="tone">Τόνος (1000Hz)</option>
                        <option value="noise">Θόρυβος (Noise)</option>
                        <option value="no">Όχι</option>
                    </select>
                </div>
            </div>
            <div id="rangeL" class="range-box active">
                <div><label>L: Από #</label><input type="number" id="wordFromL" value="1"></div>
                <div><label>L: Έως #</label><input type="number" id="wordToL" value="25"></div>
            </div>
            <div id="rangeR" class="range-box">
                <div><label>R: Από #</label><input type="number" id="wordFromR" value="1"></div>
                <div><label>R: Έως #</label><input type="number" id="wordToR" value="25"></div>
            </div>
            <label for="lF" class="custom-file-upload" id="ll">📂 ΦΟΡΤΩΣΗ ΛΙΣΤΑΣ (.txt)</label><input type="file" id="lF" style="display:none" onchange="hSelect('list')">
            <label for="nF" class="custom-file-upload" id="ln">🔊 ΦΟΡΤΩΣΗ ΘΟΡΥΒΟΥ</label><input type="file" id="nF" style="display:none" onchange="hSelect('noise')">
            <label for="wF" class="custom-file-upload" id="lw">🎵 ΦΟΡΤΩΣΗ ΗΧΗΤΙΚΩΝ</label><input type="file" id="wF" style="display:none" multiple onchange="hSelect('words')">
        </div>
        <button class="play-btn" onclick="runTest()">ΕΝΑΡΞΗ ΕΞΕΤΑΣΗΣ</button>
        <div id="historyList"></div>
    </div>

    <div id="testUI" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 id="earInd" style="margin:0; font-size:1.8em; font-weight:900;"></h2>
            <div style="font-size:2.5em; font-weight:900; color:var(--primary);" id="snrDisp">10 dB</div>
        </div>
        <canvas id="cCanvas"></canvas>
        <div style="text-align:center; font-size:3.5em; font-weight:900; padding:20px; border:5px solid var(--primary); border-radius:25px; margin:20px 0; background:white;" id="wDisp">---</div>
        <button class="play-btn" onclick="playAudio()">▶ ΠΑΙΞΕ</button>
        <div class="scoring-grid">
            <button class="btn-score s0" onclick="handleScore(0)">0</button>
            <button class="btn-score s1a" onclick="handleScore(1,'a')">1α</button>
            <button class="btn-score s1b" onclick="handleScore(1,'b')">1β</button>
            <button class="btn-score s2" onclick="handleScore(2)">2</button>
        </div>
        <button onclick="location.reload()" style="width:100%; color:var(--danger); border:2px solid var(--danger); background:none; padding:15px; border-radius:15px; font-weight:bold; cursor:pointer; margin-top:20px;">🛑 ΔΙΑΚΟΠΗ ΕΞΕΤΑΣΗΣ</button>
    </div>

    <div id="resUI" style="display:none;">
        <div id="printArea">
            <h1 style="color:var(--primary); margin:0; border-bottom:3px solid var(--primary);">Αποτελέσματα Εξέτασης</h1>
            <div id="resMeta" style="margin:15px 0; font-size:1.1em; line-height:1.6;"></div>
            <div class="srt-box" id="srtFinal">0 dB</div>
            <canvas id="fCanvas" style="height:250px; margin-bottom:20px;"></canvas>
            <table id="resTable"><thead><tr><th>#</th><th>Λέξη</th><th>SNR</th><th>Σκορ</th></tr></thead><tbody></tbody></table>
        </div>
        <div style="margin-top:25px; display:grid; gap:12px;">
            <button class="play-btn" style="font-size:18px; background:#2b5797;" onclick="exportToDoc()">💾 ΕΞΑΓΩΓΗ ΣΕ WORD (.doc)</button>
            <button class="play-btn" style="font-size:18px; background:#1d6f42;" onclick="exportToExcel()">📊 ΕΞΑΓΩΓΗ ΣΕ EXCEL (.xls)</button>
            <button class="secondary-btn" onclick="saveAndNext()">ΑΠΟΘΗΚΕΥΣΗ & ΕΠΟΜΕΝΟ ΑΥΤΙ</button>
            <button class="secondary-btn" style="background:#8e8e93" onclick="stopAndReturn()">ΕΠΙΣΤΡΟΦΗ ΣΤΗΝ ΑΡΧΗ</button>
        </div>
    </div>
</div>

<script>
    let audioCtx, calOsc, curSide = 'L', gData = { list: {}, noise: null, words: {} };
    let state = { hist: [], revs: [], idx: 0, snr: 10, step: 2, lastD: null, activeWords: [] };

    function getAudioChain() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const limiter = audioCtx.createDynamicsCompressor();
        limiter.threshold.setValueAtTime(-0.5, audioCtx.currentTime); 
        limiter.knee.setValueAtTime(0, audioCtx.currentTime); 
        limiter.ratio.setValueAtTime(20, audioCtx.currentTime); 
        limiter.attack.setValueAtTime(0.001, audioCtx.currentTime);
        limiter.release.setValueAtTime(0.1, audioCtx.currentTime);
        const masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.9, audioCtx.currentTime);
        limiter.connect(masterGain); masterGain.connect(audioCtx.destination);
        return limiter;
    }

    function toggleCalibration() {
        const chain = getAudioChain(); const btn = document.getElementById('calBtn');
        if(calOsc) { calOsc.stop(); calOsc = null; btn.innerText = "START"; btn.style.background = "var(--danger)"; }
        else {
            calOsc = audioCtx.createOscillator(); const g = audioCtx.createGain(); const p = audioCtx.createPanner();
            calOsc.frequency.value = 1000; g.gain.value = 0.5; p.setPosition(curSide==='L'?-1:1, 0, 0);
            calOsc.connect(g); g.connect(p); p.connect(chain); calOsc.start();
            btn.innerText = "STOP"; btn.style.background = "#000";
        }
    }

    function switchSide(s) { 
        curSide = s; document.querySelectorAll('.ear-opt').forEach(el => el.classList.remove('active')); 
        document.getElementById('opt'+s).classList.add('active');
        document.getElementById('rangeL').classList.toggle('active', s === 'L');
        document.getElementById('rangeR').classList.toggle('active', s === 'R');
        document.getElementById('calEar').innerText = s === 'L' ? 'LEFT' : 'RIGHT';
    }

    async function hSelect(type) {
        const input = document.getElementById(type==='list'?'lF':(type==='noise'?'nF':'wF'));
        if(!input.files.length) return;
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(type==='list') {
            const txt = await input.files[0].text();
            txt.split('\n').forEach((line, i) => {
                const parts = line.split(','); if(parts.length >= 3) gData.list[i+1] = {id:parts[0].trim(), s1:parts[1].trim(), s2:parts[2].trim()};
            });
            document.getElementById('ll').classList.add('file-selected');
        } else if(type==='noise') {
            gData.noise = await audioCtx.decodeAudioData(await input.files[0].arrayBuffer());
            document.getElementById('ln').classList.add('file-selected');
        } else {
            for(let f of input.files) { const id = f.name.replace(/\.[^/.]+$/, "").trim(); gData.words[id] = await audioCtx.decodeAudioData(await f.arrayBuffer()); }
            document.getElementById('lw').classList.add('file-selected');
        }
    }

    function runTest() {
        let from = parseInt(document.getElementById(curSide==='L'?'wordFromL':'wordFromR').value) || 1;
        let to = parseInt(document.getElementById(curSide==='L'?'wordToL':'wordToR').value) || 100;
        let available = [];
        for(let i=from; i<=to; i++) if(gData.list[i] && gData.words[gData.list[i].id]) available.push({...gData.list[i], buffer: gData.words[gData.list[i].id]});
        if(!available.length || !gData.noise) return alert("Φορτώστε Λίστα, Θόρυβο και Ηχητικά.");
        state = { hist: [], revs: [], idx: 0, snr: parseFloat(document.getElementById('startSNR').value), step: 2, lastD: null, activeWords: available.sort(() => Math.random() - 0.5) };
        document.getElementById('setup').style.display='none'; document.getElementById('testUI').style.display='block';
        document.getElementById('earInd').innerText = curSide==='L'?"ΑΡΙΣΤΕΡΟ ΑΥΤΙ":"ΔΕΞΙ ΑΥΤΙ";
        document.getElementById('earInd').style.color = curSide==='L'?'var(--primary)':'var(--danger)';
        updateUI();
    }

    async function playAudio() {
        const chain = getAudioChain(); if(audioCtx.state === 'suspended') await audioCtx.resume();
        const attentionMode = document.getElementById('preToneUse').value;
        const wordBuf = state.activeWords[state.idx].buffer;
        const preNoiseLen = Math.floor(audioCtx.sampleRate * 0.2); 
        const totalLen = preNoiseLen + wordBuf.length + Math.floor(audioCtx.sampleRate * 0.1); 
        const out = audioCtx.createBuffer(2, totalLen, audioCtx.sampleRate);
        const chan = curSide === 'L' ? 0 : 1;
        const oD = out.getChannelData(chan);
        const sD = wordBuf.getChannelData(0);
        const nD = gData.noise.getChannelData(0);

        let pS = 0; for(let i=0; i<wordBuf.length; i++) pS += sD[i]**2;
        let rmsS = Math.sqrt(pS / wordBuf.length);

        // Fixed index logic for noise (Safety against small files)
        let startIdx = Math.floor(Math.random() * gData.noise.length);
        let pN = 0;
        for(let i=0; i<wordBuf.length; i++) {
            pN += nD[(startIdx + preNoiseLen + i) % gData.noise.length]**2;
        }
        let rmsN = Math.sqrt(pN / wordBuf.length);
        let k = rmsS / (rmsN * Math.pow(10, state.snr/20));

        const fadeInLen = Math.floor(audioCtx.sampleRate * 0.05);
        for(let i=0; i<totalLen; i++) {
            let noiseVal = nD[(startIdx + i) % gData.noise.length] * k;
            if(i < fadeInLen) noiseVal *= (i / fadeInLen); 
            if(attentionMode === 'no' && i < preNoiseLen) noiseVal = 0;
            oD[i] = noiseVal;
        }

        if(attentionMode === 'tone') {
            const toneLen = Math.floor(audioCtx.sampleRate * 0.1);
            const toneStart = Math.floor(audioCtx.sampleRate * 0.05);
            for(let i=0; i<toneLen; i++) {
                oD[toneStart + i] += Math.sin(2 * Math.PI * 1000 * i / audioCtx.sampleRate) * 0.2;
            }
        }

        for(let i=0; i<wordBuf.length; i++) {
            oD[preNoiseLen + i] += sD[i];
        }

        const s = audioCtx.createBufferSource(); s.buffer = out; s.connect(chain); s.start();
    }

    function handleScore(val, type='') {
        const w = state.activeWords[state.idx];
        const isRev = (state.lastD && state.lastD !== (val===2?'down':'up'));
        state.hist.push({ snr:state.snr, val, type, s1:w.s1, s2:w.s2 });
        if(isRev) state.revs.push(state.snr);
        if(state.revs.length>=2) state.step=1;
        state.lastD=val===2?'down':'up'; state.snr += (val===2?-state.step:state.step);
        if(state.revs.length>=6 || state.idx >= state.activeWords.length - 1) {
            const avg = state.revs.length > 0 ? (state.revs.reduce((a,b)=>a+b,0)/state.revs.length).toFixed(1) : state.snr;
            saveToHistory(avg); finish(avg);
        } else { state.idx++; updateUI(); }
    }

    function updateUI() {
        document.getElementById('snrDisp').innerText = state.snr + " dB";
        document.getElementById('wDisp').innerText = state.activeWords[state.idx].s1 + state.activeWords[state.idx].s2 + ".";
        drawGraph('cCanvas', state.hist, state.snr);
    }

    function drawGraph(id, history, currentSNR) {
        const c=document.getElementById(id), ctx=c.getContext('2d');
        c.width=c.offsetWidth*2; c.height=c.offsetHeight*2; ctx.scale(2,2);
        const w=c.width/2, h=c.height/2; ctx.clearRect(0,0,w,h);
        ctx.strokeStyle="#e5e5ea"; ctx.lineWidth=1; ctx.setLineDash([]);
        ctx.fillStyle="#888"; ctx.font="bold 11px sans-serif";
        for(let i=-10; i<=30; i+=10) {
            let y = h-40-((i+10)*(h-60)/40); ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(w-10,y); ctx.stroke();
            ctx.fillText(i + " dB", 2, y+4);
        }
        const data = history.concat(currentSNR !== null ? {snr: currentSNR, val: null} : []);
        if(data.length > 1){
            ctx.beginPath(); ctx.strokeStyle="#000"; ctx.setLineDash([10, 5]); ctx.lineWidth=4;
            data.forEach((d, i) => {
                let x = 40 + (i * (w-60) / (data.length-1));
                let y = h-40-((d.snr+10)*(h-60)/40);
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }); ctx.stroke();
        }
        ctx.setLineDash([]); 
        data.forEach((d, i) => {
            let x = 40 + (i * (w-60) / (Math.max(1, data.length-1)));
            let y = h-40-((d.snr+10)*(h-60)/40);
            ctx.fillStyle = (d.val === 0 || d.val === 1) ? "var(--danger)" : (d.val === 2 ? "#000" : "#888");
            ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
            if(d.val !== null) { ctx.fillStyle="#000"; ctx.fillText(d.snr, x - 8, y - 12); }
        });
    }

    function finish(avg) {
        document.getElementById('testUI').style.display='none'; document.getElementById('resUI').style.display='block';
        document.getElementById('resMeta').innerHTML = `Ασθενής: <b>${document.getElementById('pName').value}</b> | Αυτί: <b>${curSide==='L'?'Αριστερό':'Δεξί'}</b>`;
        document.getElementById('srtFinal').innerText = avg + " dB";
        const tb=document.querySelector('#resTable tbody'); tb.innerHTML="";
        state.hist.forEach((h,i)=>{
            const s1E = (h.val===0||h.type==='b'); const s2E = (h.val===0||h.type==='a');
            tb.insertRow().innerHTML=`<td>${i+1}</td><td><span style="${s1E?'color:red':''}">${h.s1}</span><span style="${s2E?'color:red':''}">${h.s2}</span></td><td>${h.snr}</td><td>${h.val===2?'100%':(h.val===0?'0%':'50%')}</td>`;
        });
        drawGraph('fCanvas', state.hist, null);
    }

    function saveToHistory(srt) {
        let history = JSON.parse(localStorage.getItem('audit_v88_final') || '[]');
        history.push({ id: Date.now(), name: document.getElementById('pName').value, side: curSide, srt: srt, date: new Date().toLocaleString('el-GR'), raw: [...state.hist] });
        localStorage.setItem('audit_v88_final', JSON.stringify(history.slice(-15))); loadHistory();
    }

    function deleteFromHistory(e, id) {
        e.stopPropagation(); if(!confirm("Σίγουρη διαγραφή;")) return;
        let history = JSON.parse(localStorage.getItem('audit_v88_final') || '[]');
        localStorage.setItem('audit_v88_final', JSON.stringify(history.filter(item => item.id !== id))); loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('audit_v88_final') || '[]');
        const list = document.getElementById('historyList');
        list.innerHTML = history.length ? '<label>Ιστορικό Εξετάσεων</label>' : '';
        history.reverse().forEach((item, idx) => {
            const realIdx = history.length - 1 - idx;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'history-item';
            itemDiv.innerHTML = `<div class="history-link" onclick="viewHistory(${realIdx})"><b>${item.name}</b><br><small>${item.date} | ${item.side==='L'?'Αρ':'Δε'} | ${item.srt}dB</small></div><button class="del-btn" onclick="deleteFromHistory(event, ${item.id})">🗑️</button>`;
            list.appendChild(itemDiv);
        });
    }

    function viewHistory(idx) {
        const history = JSON.parse(localStorage.getItem('audit_v88_final') || '[]');
        const item = history[idx]; document.getElementById('pName').value = item.name;
        curSide = item.side; state.hist = item.raw; document.getElementById('setup').style.display='none'; finish(item.srt);
    }

    function getFileName(ext) {
        const name = (document.getElementById('pName').value || "Ανώνυμος").replace(/\s+/g, '_');
        const date = new Date().toLocaleDateString('el-GR').replace(/\//g, '-');
        return `${name}_${date}.${ext}`;
    }

    function exportToDoc() {
        let rows = "";
        state.hist.forEach((h, i) => {
            const s1S = (h.val===0||h.type==='b') ? 'color:red;font-weight:bold;' : '';
            const s2S = (h.val===0||h.type==='a') ? 'color:red;font-weight:bold;' : '';
            rows += `<tr><td>${i+1}</td><td><span style="${s1S}">${h.s1}</span><span style="${s2S}">${h.s2}</span></td><td>${h.snr}</td><td>${h.val===2?'100%':(h.val===0?'0%':'50%')}</td></tr>`;
        });
        const html = `<html><head><meta charset="utf-8"></head><body style="font-family:Arial;"><h2>Αναφορά: ${document.getElementById('pName').value}</h2><p>Αυτί: ${curSide} | SRT: ${document.getElementById('srtFinal').innerText}</p><table border="1" style="width:100%;border-collapse:collapse;text-align:center;"><tr><th>#</th><th>Λέξη</th><th>SNR</th><th>Σκορ</th></tr>${rows}</table></body></html>`;
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([html], { type: 'application/msword' })); a.download = getFileName('doc'); a.click();
    }

    function exportToExcel() {
        let xml = `<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
        <Styles><Style ss:ID="sCenter"><Alignment ss:Horizontal="Center" ss:Vertical="Center"/></Style></Styles>
        <Worksheet ss:Name="Results"><Table ss:DefaultColumnWidth="100">`;
        xml += `<Row ss:StyleID="sCenter"><Cell><Data ss:Type="String">A/A</Data></Cell><Cell><Data ss:Type="String">Λέξη</Data></Cell><Cell><Data ss:Type="String">Συλλαβή 1</Data></Cell><Cell><Data ss:Type="String">Συλλαβή 2</Data></Cell><Cell><Data ss:Type="String">SNR (dB)</Data></Cell><Cell><Data ss:Type="String">Σκορ</Data></Cell></Row>`;
        state.hist.forEach((h, i) => {
            xml += `<Row ss:StyleID="sCenter"><Cell><Data ss:Type="Number">${i+1}</Data></Cell><Cell><Data ss:Type="String">${h.s1}${h.s2}</Data></Cell><Cell><Data ss:Type="String">${(h.val===0||h.type==='b')?'Λ':'Σ'}</Data></Cell><Cell><Data ss:Type="String">${(h.val===0||h.type==='a')?'Λ':'Σ'}</Data></Cell><Cell><Data ss:Type="Number">${h.snr}</Data></Cell><Cell><Data ss:Type="String">${h.val===2?'100%':(h.val===0?'0%':'50%')}</Data></Cell></Row>`;
        });
        xml += `</Table></Worksheet></Workbook>`;
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([xml], { type: "application/vnd.ms-excel" })); a.download = getFileName('xls'); a.click();
    }

    function stopAndReturn() { document.getElementById('resUI').style.display='none'; document.getElementById('setup').style.display='block'; }
    function saveAndNext() { switchSide(curSide==='L'?'R':'L'); stopAndReturn(); }
</script>
</body>
